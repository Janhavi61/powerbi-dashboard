<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power BI Dashboard Report</title>

    <style>
        body{
            margin:0;
            padding:0;
            font-family: Arial, sans-serif;
            background:#0f172a;
            color:white;
            text-align:center;
        }

        .container{
            padding:40px;
        }

        h1{
            font-size:40px;
            margin-bottom:10px;
            color:#38bdf8;
        }

        p{
            font-size:18px;
            color:#cbd5e1;
        }

        .btn{
            display:inline-block;
            margin-top:25px;
            padding:14px 30px;
            background:#38bdf8;
            color:black;
            text-decoration:none;
            border-radius:10px;
            font-weight:bold;
            transition:0.3s;
        }

        .btn:hover{
            background:white;
            transform:scale(1.05);
        }

        .card{
            background:#1e293b;
            padding:30px;
            border-radius:20px;
            max-width:700px;
            margin:auto;
            box-shadow:0 0 20px rgba(0,0,0,0.4);
        }

        iframe{
            width:100%;
            height:600px;
            border:none;
            border-radius:15px;
            margin-top:25px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">

            <h1>Power BI Dashboard</h1>

            <p>
                This repository contains my Power BI Dashboard Report and project details.
            </p>

            <!-- PDF LINK BUTTON -->
            <a class="btn" href="report customer shopping dataset.pdf" target="_blank">
                View Report PDF
            </a>

            <!-- OPTIONAL PDF PREVIEW -->


        </div>
    </div>

</body>
</html>
